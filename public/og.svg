<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A365D"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Logo block -->
  <g transform="translate(80 220)">
    <rect width="100" height="100" rx="20" fill="#059669"/>
    <g transform="translate(20 28)">
      <path fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"
            d="M37 44V18a2 2 0 0 0-2-2H14a2 2 0 0 0-2 2v26l5-2 5 2 5-2 5 2 5-2zm0 0l5 2 5-2 5 2V18a2 2 0 0 0-2-2H39"/>
    </g>
  </g>

  <!-- Headline -->
  <text x="220" y="265" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="64" font-weight="800" fill="white">FlyttGo</text>
  <text x="220" y="320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="500" fill="#A7F3D0">Norway's #1 Moving &amp; Logistics Marketplace</text>

  <!-- Sub-line -->
  <text x="80" y="450" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">Verified drivers · Real-time tracking · Secure escrow payment</text>

  <!-- City chips -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="white">
    <rect x="80"  y="500" rx="18" width="110" height="36" fill="rgba(255,255,255,0.15)"/>
    <text x="135" y="525" text-anchor="middle">Oslo</text>
    <rect x="200" y="500" rx="18" width="130" height="36" fill="rgba(255,255,255,0.15)"/>
    <text x="265" y="525" text-anchor="middle">Bergen</text>
    <rect x="340" y="500" rx="18" width="170" height="36" fill="rgba(255,255,255,0.15)"/>
    <text x="425" y="525" text-anchor="middle">Trondheim</text>
    <rect x="520" y="500" rx="18" width="170" height="36" fill="rgba(255,255,255,0.15)"/>
    <text x="605" y="525" text-anchor="middle">Stavanger</text>
  </g>
</svg>
